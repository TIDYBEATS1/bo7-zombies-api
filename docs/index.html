<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BO7 Zombies Relics</title>

<style>

body {
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    margin:0;
    padding:20px;
}

h1 {
    text-align:center;
}


.controls {
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:25px;
}


input, select {
    padding:10px;
    border-radius:8px;
    border:0;
}


.grid {

    display:grid;
    grid-template-columns:
    repeat(auto-fill,minmax(220px,1fr));

    gap:20px;

}


.card {

    background:#222;
    padding:15px;
    border-radius:15px;
    text-align:center;

}


.card img {

    width:150px;
    height:150px;
    object-fit:contain;

}


button {

    padding:10px 15px;
    border:0;
    border-radius:8px;
    cursor:pointer;

}


.Grim {

    border:2px solid #777;

}


.Sinister {

    border:2px solid purple;

}


.Wicked {

    border:2px solid red;

}


/* Popup */

.modal {

    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);

    justify-content:center;
    align-items:center;

}


.modal-box {

    background:#222;
    padding:25px;
    border-radius:15px;

    width:90%;
    max-width:500px;

}


.modal img {

    width:180px;

}


.close {

    float:right;
    cursor:pointer;
    font-size:25px;

}


</style>

</head>


<body>


<h1>
Call of Duty Black Ops 7 Zombies Relics
</h1>


<div class="controls">

<input 
id="search"
placeholder="Search relics">


<select id="rarity">

<option value="">
All Rarities
</option>

<option value="Grim">
Grim
</option>

<option value="Sinister">
Sinister
</option>

<option value="Wicked">
Wicked
</option>

</select>

</div>


<div class="grid" id="relics"></div>



<div class="modal" id="modal">

<div class="modal-box">

<span class="close" onclick="closeRelic()">
✖
</span>

<div id="details"></div>

</div>

</div>



<script>


let allRelics=[];



fetch("./api/relics/index.json")

.then(r=>r.json())

.then(data=>{

allRelics=data.relics;

display(allRelics);

});




function display(relics){


let box=document.getElementById("relics");

box.innerHTML="";



relics.forEach(r=>{


let card=document.createElement("div");


card.className="card "+r.rarity;



card.innerHTML=`

<img src="${r.image}">

<h2>${r.name}</h2>

<p>${r.map}</p>

<p>${r.rarity}</p>


<button onclick="openRelic('${r.id}')">

View Details

</button>

`;



box.appendChild(card);


});


}





function openRelic(id){



fetch(`./api/relics/${id}.json`)

.then(r=>r.json())

.then(data=>{


document.getElementById("details").innerHTML=`

<img src="${data.image}">


<h2>${data.name}</h2>


<p>
<b>Map:</b>
${data.map}
</p>


<p>
<b>Rarity:</b>
${data.rarity}
</p>


<p>
<b>Effect:</b><br>
${data.effect}
</p>


<p>
<b>Unlock:</b><br>
${data.unlock}
</p>


`;



document
.getElementById("modal")
.style.display="flex";


});


}





function closeRelic(){


document
.getElementById("modal")
.style.display="none";


}





function filter(){


let search=
document
.getElementById("search")
.value
.toLowerCase();



let rarity=
document
.getElementById("rarity")
.value;




let filtered=
allRelics.filter(r=>{


return (

r.name
.toLowerCase()
.includes(search)

&&

(!rarity || r.rarity===rarity)

);


});



display(filtered);


}



document
.getElementById("search")
.addEventListener(
"input",
filter
);



document
.getElementById("rarity")
.addEventListener(
"change",
filter
);



</script>


</body>
</html>
